buildscript {
  ext.FastOpencv = [
    kotlinVersion: "2.1.20",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    ndkVersion: "27.1.12297006"
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return FastOpencv[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.12.0"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
  namespace "com.fastopencv"

  compileSdkVersion getExtOrDefault("compileSdkVersion")
  ndkVersion getExtOrDefault("ndkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
        abiFilters (*reactNativeArchitectures())

        buildTypes {
          debug {
            cppFlags "-O1 -g"
          }
          release {
            cppFlags "-O2"
          }
        }
      }
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  packaging {
    resources {
      excludes += [
        "META-INF",
        "META-INF/**"
      ]
    }

    jniLibs {
      // These libraries are provided at runtime by the app (react-android)
      // and by the org.opencv:opencv AAR, so they must not be packaged twice.
      excludes += [
        "**/libc++_shared.so",
        "**/libfbjni.so",
        "**/libjsi.so",
        "**/libreactnative.so",
        "**/libhermes.so",
        "**/libhermestooling.so",
        "**/libopencv_java4.so"
      ]
    }
  }

  buildFeatures {
    prefab true
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  sourceSets {
    main {
      // Codegen output is committed to the repo (codegenConfig.includesGeneratedCode)
      java.srcDirs += ["generated/java"]
    }
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation 'org.opencv:opencv:4.12.0'
}
